apiVersion: v1
kind: Service
metadata:
  name: external-truenas
  namespace: media-v2
spec:
  type: ExternalName
  externalName: truenas.asandov.local
---
# ClusterIP service with explicit endpoints for traefik compatibility
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-truenas
  namespace: media-v2
spec:
  ports:
  - port: 30013
    targetPort: 30013
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jellyfin-truenas
  namespace: media-v2
  labels:
    kubernetes.io/service-name: jellyfin-truenas
addressType: IPv4
endpoints:
- addresses:
  - "10.0.1.14"
ports:
- port: 30013
  protocol: TCP