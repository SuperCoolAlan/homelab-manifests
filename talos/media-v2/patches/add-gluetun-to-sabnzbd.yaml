- op: add
  path: /spec/template/spec/dnsPolicy
  value: "None"
- op: add
  path: /spec/template/spec/dnsConfig
  value:
    nameservers:
      - 10.96.0.10
- op: add
  path: /spec/template/spec/initContainers/0
  value:
    name: gluetun
    image: qmcgaw/gluetun:latest
    restartPolicy: Always
    imagePullPolicy: Always
    env:
    - name: BLOCK_MALICIOUS
      value: "on"
    - name: BLOCK_SURVEILLANCE
      value: "on"
    - name: BLOCK_ADS
      value: "on"
    - name: TZ
      value: America/Chicago
    - name: VPN_SERVICE_PROVIDER
      value: custom
    - name: VPN_TYPE
      value: wireguard
    - name: FIREWALL
      value: "off"
    - name: FIREWALL_OUTBOUND_SUBNETS
      value: "10.0.0.0/8"
    - name: FIREWALL_INPUT_PORTS
      value: "8080,8888"
    - name: HTTPPROXY
      value: "on"
    - name: HTTPPROXY_LOG
      value: "on"
    envFrom:
    - secretRef:
        name: windscribe-wireguard-creds
    startupProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - nslookup news.newshosting.com 127.0.0.1 > /dev/null 2>&1 && nslookup news.eweka.nl 127.0.0.1 > /dev/null 2>&1
      initialDelaySeconds: 5
      periodSeconds: 3
      failureThreshold: 20
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
      privileged: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
